version: "3.9"

# ═══════════════════════════════════════════════════════════════════════════════
#  JEE Math Tutor — Docker Compose
#
#  Services:
#    redis       — Redis Stack (Redis + RedisJSON + RediSearch) for STM + LTM
#    manim-mcp   — FastMCP Manim rendering server
#    app         — Streamlit frontend + backend (optional, see note below)
#
#  Start everything:      docker compose up -d
#  Start only Redis:      docker compose up -d redis
#  Start Redis + Manim:   docker compose up -d redis manim-mcp
#  View logs:             docker compose logs -f
#  Stop everything:       docker compose down
#
#  NOTE: The Streamlit app service is commented out by default.
#  Run it locally with: bash entrypoint.sh
#  Uncomment the `app` service only if you want to containerise the whole stack.
# ═══════════════════════════════════════════════════════════════════════════════

services:

  # ── Redis Stack ──────────────────────────────────────────────────────────────
  # redis-stack bundles:
  #   • Redis 7          — core key-value store (STM via RedisSaver checkpointer)
  #   • RedisJSON        — JSON.SET / JSON.GET used by all LTM operations
  #   • RediSearch       — vector index used by RedisVL episodic memory search
  #
  # RedisInsight UI is available at http://localhost:8001 (no auth by default).
  # Connect it to redis://default:jee_secret@redis:6379 inside the UI.
  # ─────────────────────────────────────────────────────────────────────────────
  redis:
    image: redis/redis-stack:latest
    container_name: jee_redis
    restart: unless-stopped
    ports:
      - "6379:6379"     # Redis
      - "8001:8001"     # RedisInsight UI
    volumes:
      - redis_data:/data
    environment:
      # RedisInsight does not need a password to connect internally
      - REDIS_ARGS=--requirepass jee_secret
    command: >
      redis-stack-server
        --requirepass jee_secret
        --appendonly yes
        --appendfsync everysec
        --maxmemory 2gb
        --maxmemory-policy allkeys-lru
        --save 900 1
        --save 300 10
        --save 60 10000
        --loglevel notice
    healthcheck:
      test: ["CMD", "redis-cli", "-a", "jee_secret", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s

  # ── Manim MCP Server ─────────────────────────────────────────────────────────
  # FastMCP server that renders Manim scenes to mp4.
  # Requires a Dockerfile.manim in src/backend/agents/nodes/tools/mcp/.
  # See the Dockerfile.manim template included alongside this file.
  # ─────────────────────────────────────────────────────────────────────────────
  manim-mcp:
    build:
      context: ./src/backend/agents/nodes/tools/mcp
      dockerfile: Dockerfile.manim
    container_name: jee_manim_mcp
    restart: unless-stopped
    ports:
      - "8765:8765"
    volumes:
      - ./manim_outputs:/app/manim_outputs
    environment:
      - MANIM_OUTPUT_DIR=/app/manim_outputs
      - MANIM_SERVER_PORT=8765
      - MANIM_PYTHON=/usr/local/bin/python3
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8765/mcp"]
      interval: 15s
      timeout: 5s
      retries: 3
      start_period: 20s
    depends_on:
      redis:
        condition: service_healthy

  # ── Streamlit App (optional — uncomment to containerise) ─────────────────────
  # app:
  #   build:
  #     context: .
  #     dockerfile: Dockerfile
  #   container_name: jee_app
  #   restart: unless-stopped
  #   ports:
  #     - "8501:8501"
  #   volumes:
  #     - ./.streamlit/secrets.toml:/app/.streamlit/secrets.toml:ro
  #     - ./uploads:/app/uploads
  #     - ./manim_outputs:/app/manim_outputs
  #     - ./logs:/app/logs
  #   environment:
  #     - REDIS_URL=redis://:jee_secret@redis:6379
  #     - MANIM_MCP_SERVER_URL=http://manim-mcp:8765/mcp
  #   depends_on:
  #     redis:
  #       condition: service_healthy
  #     manim-mcp:
  #       condition: service_healthy

volumes:
  redis_data:
    driver: local